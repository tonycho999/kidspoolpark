<html lang="ko">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">예약 시스템</a></div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav id="navMenu">
            <ul>
                <li><a href="period.html">운영기간안내</a></li>
                <li><a href="guide.html">이용안내</a></li>

                <li><a href="location.html">오시는길</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>예약하기</h2>
        <form id="reserveForm" class="reserve-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="예: 홍길동">
            </div>
            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" required placeholder="예: 010-1234-5678">
            </div>
            <div class="form-group">
                <label for="people">인원</label>
                <input type="number" id="people" name="people" min="1" required placeholder="예: 2">
            </div>
            <div class="form-group">
                <label for="date">날짜</label>
                <input type="date" id="date" name="date" required>
            </div>
            <button type="submit" class="submit-btn">예약 신청하기</button>
        </form>
    </main>
    <footer>
        <div class="company-name">케이앤와이 주식회사 (KNY Company)</div>
        <div class="footer-info">
            <span>대표 : 강경란</span> <span class="divider">|</span> 
            <span>주소 : 경기도 동두천시 삼육사로 1084-15, 2층</span><br>
            <span>사업자등록번호 : 388-81-01529</span> <span class="divider">|</span> 
            <span>통신판매업신고 : 신고면제</span><br>
            <span>전화 : 010-6284-5551</span> <span class="divider">|</span> 
            <span>메일 : <a href="mailto:kny-company@naver.com">kny-company@naver.com</a></span>
        </div>
        <div>&copy; 2026 KNY Company. All Rights Reserved.</div>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/reserve.js"></script>
</body>
</html>
