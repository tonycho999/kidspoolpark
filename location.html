<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오시는길</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 오시는길 전용 스타일 */
        .location-wrap {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }
        .location-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .location-card h3 {
            color: #0056b3;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .location-card p {
            color: #555;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        /* 지도 클릭 영역 가짜 이미지 (회색 배경) */
        .map-placeholder {
            width: 100%;
            height: 250px;
            background-color: #e9ecef;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #ccc;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .map-placeholder:hover {
            opacity: 0.85;
            border-color: #0056b3;
        }
        .map-text {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            pointer-events: none; /* 텍스트 클릭 방해 방지 */
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">예약 시스템</a></div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <nav id="navMenu">
            <ul>
                <li><a href="period.html">운영기간안내</a></li>
                <li><a href="guide.html">이용안내</a></li>
                <li><a href="reserve.html">예약하기</a></li>
                <li><a href="location.html">오시는길</a></li>
            </ul>
        </nav>
    </header>

    <main class="container location-wrap">
        <h2 style="text-align: center; margin-bottom: 2rem;">오시는길</h2>

        <!-- 장소 1 -->
        <div class="location-card">
            <h3>📍 장소 1</h3>
            <p>경기도 과천시 갈현동 846</p>
            <div class="map-placeholder" onclick="openNaverMap('경기도 과천시 갈현동 846')">
                <span class="map-text">🗺️ 네이버 지도에서 보기 (클릭)</span>
            </div>
        </div>

        <!-- 장소 2 -->
        <div class="location-card">
            <h3>📍 장소 2 (잭과나무 물놀이터)</h3>
            <p>경기도 과천시 문원로 56 (문원체육공원)</p>
            <div class="map-placeholder" onclick="openNaverMap('경기도 과천시 문원로 56')">
                <span class="map-text">🗺️ 네이버 지도에서 보기 (클릭)</span>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // PC와 모바일을 구분하여 네이버 지도를 여는 함수
        function openNaverMap(query) {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const encodedQuery = encodeURIComponent(query);

            if (isMobile) {
                // [모바일 환경] 네이버 지도 앱 호출 (App Scheme)
                const appUrl = `nmap://search?query=${encodedQuery}&appname=reservation_system`;
                const webUrl = `https://m.map.naver.com/search2/search.naver?query=${encodedQuery}`;
                
                // 앱 실행을 시도하고, 앱이 설치되어 있지 않으면 0.5초 뒤에 모바일 웹 브라우저로 이동
                setTimeout(() => {
                    window.location.href = webUrl;
                }, 500);
                window.location.href = appUrl;
            } else {
                // [PC 환경] 네이버 지도 PC웹버전 새 창 열기
                const pcUrl = `https://map.naver.com/v5/search/${encodedQuery}`;
                window.open(pcUrl, '_blank');
            }
        }
    </script>
</body>
</html>
